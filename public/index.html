<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title> Product Listing</title>
  <meta name="description"
    content="Discover premium products with our advanced search and beautifully designed product pages.">
  <link rel="icon" href="data:,">
  <link rel="stylesheet" href="index.css">
</head>

<body>
  <header>
    <nav>
      <button id="nav-store" class="active">Storefront</button>
      <button id="nav-admin">Admin Dashboard</button>
      <button onclick="window.location.href='/api/docs'">API Docs</button>
    </nav>
  </header>

  <main>
    <!-- Storefront View -->
    <div id="view-store">
      <div class="search-container">
        <input type="text" id="search-input" class="form-control"
          placeholder="Search for products by name or description...">
        <button id="search-btn" class="btn-primary">Search</button>
      </div>

      <div id="products-loading" class="hidden">Loading products...</div>
      <div id="products-grid" class="product-grid"></div>

      <div style="margin-top: 2rem; display: flex; justify-content: space-between; align-items: center;">
        <span id="pagination-info" style="color: var(--text-secondary);"></span>
        <div style="display: flex; gap: 1rem;">
          <button id="prev-page" class="btn-primary" style="display: none;">Previous</button>
          <button id="next-page" class="btn-primary" style="display: none;">Next</button>
        </div>
      </div>
    </div>

    <!-- Admin Dashboard View -->
    <div id="view-admin" class="hidden glass-panel">
      <div style="display: flex; justify-content: space-between; margin-bottom: 2rem; align-items: center;">
        <h2>Product Management</h2>
        <button id="btn-add-product" class="btn-primary">+ Add Product</button>
      </div>

      <div style="overflow-x: auto;">
        <table class="admin-table">
          <thead>
            <tr>
              <th>ID</th>
              <th>SKU</th>
              <th>Name</th>
              <th>Price</th>
              <th>Stock</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="admin-tbody"></tbody>
        </table>
      </div>
    </div>
  </main>

  <!-- Product Detail Modal -->
  <div id="detail-modal" class="modal-overlay">
    <div class="modal-content">
      <button class="modal-close" id="close-detail">&times;</button>
      <div id="detail-content"></div>
    </div>
  </div>

  <!-- Admin Form Modal -->
  <div id="admin-modal" class="modal-overlay">
    <div class="modal-content">
      <button class="modal-close" id="close-admin-form">&times;</button>
      <h2 id="admin-form-title">Add Product</h2>
      <form id="admin-form">
        <input type="hidden" id="form-id">
        <div class="form-group">
          <label>SKU (required)</label>
          <input type="text" id="form-sku" class="form-control" required>
        </div>
        <div class="form-group">
          <label>Name (required)</label>
          <input type="text" id="form-name" class="form-control" required>
        </div>
        <div class="form-group">
          <label>Description</label>
          <textarea id="form-desc" class="form-control" rows="3"></textarea>
        </div>
        <div style="display: flex; gap: 1rem;">
          <div class="form-group" style="flex:1;">
            <label>Price (required)</label>
            <input type="number" step="0.01" id="form-price" class="form-control" required>
          </div>
          <div class="form-group" style="flex:1;">
            <label>Brand</label>
            <input type="text" id="form-brand" class="form-control">
          </div>
        </div>
        <div class="form-group">
          <label>Image URL</label>
          <input type="url" id="form-image" class="form-control" placeholder="https://example.com/image.jpg">
        </div>
        <div class="form-group">
          <label>
            <input type="checkbox" id="form-available" checked>
            In Stock
          </label>
        </div>
        <button type="submit" class="btn-primary" style="width: 100%;">Save Product</button>
      </form>
    </div>
  </div>

  <script>
    // State
    let currentPage = 1;
    let searchQuery = '';
    const API_BASE = '/api/products';

    // DOM Elements
    const viewStore = document.getElementById('view-store');
    const viewAdmin = document.getElementById('view-admin');
    const navStore = document.getElementById('nav-store');
    const navAdmin = document.getElementById('nav-admin');

    const productsGrid = document.getElementById('products-grid');
    const searchInput = document.getElementById('search-input');
    const searchBtn = document.getElementById('search-btn');
    const adminTbody = document.getElementById('admin-tbody');

    // Navigation
    navStore.addEventListener('click', () => {
      viewStore.classList.remove('hidden');
      viewAdmin.classList.add('hidden');
      navStore.classList.add('active');
      navAdmin.classList.remove('active');
      fetchProducts();
    });

    navAdmin.addEventListener('click', () => {
      viewAdmin.classList.remove('hidden');
      viewStore.classList.add('hidden');
      navAdmin.classList.add('active');
      navStore.classList.remove('active');
      fetchAdminProducts();
    });

    // Storefront Logic
    async function fetchProducts(page = 1) {
      currentPage = page;
      productsGrid.innerHTML = '';
      document.getElementById('products-loading').classList.remove('hidden');

      try {
        const res = await fetch(`${API_BASE}?q=${searchQuery}&page=${page}`);
        const data = await res.json();

        document.getElementById('products-loading').classList.add('hidden');
        renderProducts(data.data);
        updatePagination(data.pagination);
      } catch (err) {
        console.error(err);
      }
    }

    function renderProducts(products) {
      if (products.length === 0) {
        productsGrid.innerHTML = '<p>No products found.</p>';
        return;
      }

      products.forEach(p => {
        const card = document.createElement('div');
        card.className = 'product-card';
        card.onclick = () => showProductDetail(p.id);

        const imageUrl = (p.images && p.images.length > 0) ? p.images[0] : '';
        const imgHtml = imageUrl ? `<img src="${imageUrl}" alt="${p.name}">` : `<div class="product-image-placeholder">No Image</div>`;

        card.innerHTML = `
          <div class="product-image">${imgHtml}</div>
          <div class="product-info">
            <div class="product-title">${p.name}</div>
            <div class="product-price">$${Number(p.price).toFixed(2)}</div>
            <div class="product-desc">${p.description ? p.description.substring(0, 80) + '...' : ''}</div>
            <button class="btn-primary" style="margin-top:auto;">View Details</button>
          </div>
        `;
        productsGrid.appendChild(card);
      });
    }

    function updatePagination(pg) {
      const prev = document.getElementById('prev-page');
      const next = document.getElementById('next-page');
      const info = document.getElementById('pagination-info');

      info.textContent = `Page ${pg.page} of ${pg.pages} (Total: ${pg.total})`;

      prev.style.display = pg.page > 1 ? 'block' : 'none';
      next.style.display = pg.page < pg.pages ? 'block' : 'none';

      prev.onclick = () => fetchProducts(pg.page - 1);
      next.onclick = () => fetchProducts(pg.page + 1);
    }

    searchBtn.addEventListener('click', () => {
      searchQuery = searchInput.value;
      fetchProducts(1);
    });

    searchInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') {
        searchQuery = searchInput.value;
        fetchProducts(1);
      }
    });

    // Detail Modal
    async function showProductDetail(id) {
      try {
        const res = await fetch(`${API_BASE}/${id}`);
        const p = await res.json();

        const content = document.getElementById('detail-content');
        const imageUrl = (p.images && p.images.length > 0) ? p.images[0] : '';

        content.innerHTML = `
          <div style="display: flex; gap: 2rem; flex-wrap: wrap;">
            <div style="flex: 1; min-width: 250px; background: rgba(0,0,0,0.3); border-radius: 12px; display:flex; align-items:center; justify-content:center; overflow:hidden;">
              ${imageUrl ? `<img src="${imageUrl}" style="max-width:100%; object-fit:contain;">` : 'No Image'}
            </div>
            <div style="flex: 1.5; min-width: 300px;">
              <div class="badge ${p.availability ? 'badge-success' : 'badge-danger'}" style="margin-bottom: 1rem;">
                ${p.availability ? 'In Stock' : 'Out of Stock'}
              </div>
              <h1 style="font-size: 2rem; margin-bottom: 0.5rem;">${p.name}</h1>
              <div style="color: var(--text-secondary); margin-bottom: 1rem;">SKU: ${p.sku} | Brand: ${p.brand || 'N/A'}</div>
              <div style="font-size: 2rem; font-weight: 700; color: var(--success-color); margin-bottom: 1.5rem;">$${Number(p.price).toFixed(2)}</div>
              
              <h3>Description</h3>
              <p style="color: var(--text-secondary); line-height: 1.6; margin-bottom: 1.5rem;">
                ${p.description || 'No description available.'}
              </p>
              
              <div style="display: flex; gap: 1rem; align-items: center;">
                <div style="color: var(--text-secondary);">
                  Rating: <strong style="color: #fbbf24;">★ ${p.rating}</strong> (${p.reviews_count} reviews)
                </div>
              </div>
            </div>
          </div>
        `;
        document.getElementById('detail-modal').classList.add('active');
      } catch (err) {
        alert('Error fetching product details');
      }
    }

    document.getElementById('close-detail').onclick = () => {
      document.getElementById('detail-modal').classList.remove('active');
    };

    // Admin Logic
    async function fetchAdminProducts() {
      try {
        const res = await fetch(`${API_BASE}?limit=100`);
        const data = await res.json();

        adminTbody.innerHTML = '';
        data.data.forEach(p => {
          const tr = document.createElement('tr');
          tr.innerHTML = `
            <td>${p.id}</td>
            <td>${p.sku}</td>
            <td>${p.name}</td>
            <td>$${Number(p.price).toFixed(2)}</td>
            <td>
              <span class="badge ${p.availability ? 'badge-success' : 'badge-danger'}">
                ${p.availability ? 'In Stock' : 'Out of Stock'}
              </span>
            </td>
            <td>
              <button class="btn-primary" style="padding: 0.25rem 0.75rem; font-size: 0.875rem;" onclick="editProduct(${p.id})">Edit</button>
              <button class="btn-danger" style="padding: 0.25rem 0.75rem; font-size: 0.875rem; margin-left: 0.5rem;" onclick="deleteProduct(${p.id})">Delete</button>
            </td>
          `;
          adminTbody.appendChild(tr);
        });
      } catch (err) {
        console.error(err);
      }
    }

    // Admin Form Modal
    const adminModal = document.getElementById('admin-modal');
    const adminForm = document.getElementById('admin-form');

    document.getElementById('btn-add-product').onclick = () => {
      document.getElementById('admin-form-title').textContent = 'Add Product';
      adminForm.reset();
      document.getElementById('form-id').value = '';
      adminModal.classList.add('active');
    };

    document.getElementById('close-admin-form').onclick = () => {
      adminModal.classList.remove('active');
    };

    async function editProduct(id) {
      try {
        const res = await fetch(`${API_BASE}/${id}`);
        const p = await res.json();

        document.getElementById('admin-form-title').textContent = 'Edit Product';
        document.getElementById('form-id').value = p.id;
        document.getElementById('form-sku').value = p.sku;
        document.getElementById('form-name').value = p.name;
        document.getElementById('form-desc').value = p.description || '';
        document.getElementById('form-price').value = p.price;
        document.getElementById('form-brand').value = p.brand || '';
        document.getElementById('form-image').value = (p.images && p.images.length > 0) ? p.images[0] : '';
        document.getElementById('form-available').checked = p.availability;

        adminModal.classList.add('active');
      } catch (err) {
        alert('Error fetching product for edit');
      }
    }

    adminForm.onsubmit = async (e) => {
      e.preventDefault();

      const id = document.getElementById('form-id').value;
      const payload = {
        sku: document.getElementById('form-sku').value,
        name: document.getElementById('form-name').value,
        description: document.getElementById('form-desc').value,
        price: parseFloat(document.getElementById('form-price').value),
        brand: document.getElementById('form-brand').value,
        availability: document.getElementById('form-available').checked,
      };

      const img = document.getElementById('form-image').value;
      if (img) {
        payload.images = JSON.stringify([img]);
      } else {
        payload.images = JSON.stringify([]);
      }

      const method = id ? 'PUT' : 'POST';
      const url = id ? `${API_BASE}/${id}` : API_BASE;

      try {
        const res = await fetch(url, {
          method,
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });

        if (res.ok) {
          adminModal.classList.remove('active');
          fetchAdminProducts();
        } else {
          const err = await res.json();
          alert(`Error: ${err.error}`);
        }
      } catch (err) {
        alert('An error occurred while saving.');
      }
    };

    async function deleteProduct(id) {
      if (confirm('Are you sure you want to delete this product?')) {
        try {
          await fetch(`${API_BASE}/${id}`, { method: 'DELETE' });
          fetchAdminProducts();
        } catch (err) {
          alert('Error deleting product');
        }
      }
    }

    // Initialize
    fetchProducts();
  </script>
</body>

</html>
